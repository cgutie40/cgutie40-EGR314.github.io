site_name: EGR314- Cristopher Gutierrez Datasheet
site_url: https://cgutie40.github.io/cgutie40-EGR314.github.io/
repo_url: https://github.com/embedded-systems-design/EGR314DataSheetTemplate
edit_uri: edit/main/docs/
theme:
  name: material
  custom_dir: custom_theme/partials
  palette:
    primary: teal
    accent: indigo
  font:
    text: Roboto
  logo: static/logo314.svg
  favicon: static/logo314.png

  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.tabs.overflow
    - toc.follow    
    - navigation.top
    - navigation.path
    - navigation.indexes
    - navigation.prune
    - content.action.edit
    - navigation.footer
#    - navigation.sections
    - navigation.expand
#    - navigation.instant # doesn't work that well

markdown_extensions:
  - attr_list #add attributes using curly brackets to images, see https://squidfunk.github.io/mkdocs-material/reference/images/
  - md_in_html # see https://squidfunk.github.io/mkdocs-material/reference/images/
  - footnotes
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tilde: {}
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

draft_docs: |
  **/*_unpublished.md
  **/*_draft.md
  **/*_draft**
  
plugins:
  - search
  - glightbox # allow resize images, see https://squidfunk.github.io/mkdocs-material/reference/images/

extra_css:
  - stylesheets/extra.css  

extra_javascript:
 - javascripts/mathjax.js
 - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
    
not_in_nav: |
  static
  
copyright: "Copyright &copy; 2026 Cristopher Gutierrez"

extra:
  generator: false
  social:
    - icon: fontawesome/regular/file-code
      link: /2026_spring
      name: 2023 Site    
      
nav:
  - Welcome: index.md
  - Requirements: 01-Requirements/Requirements.md
  - Block Diagram: 02-Block-Diagram/Block-Diagram.md
  - Component Selection: 03-Component-Selection/Component-Selection.md
  - Microcontroller Selection: 04-Microcontroller-Selection/Microcontroller-Selection.md
  - Power Budget: 05-Power Budget/Power_budget.md
  - BOM: 06-BOM/BOM.md
  - Schematic: 07-Schematic/schematic.md
  - API: 08-API/API.md
  - Appendix: Appendix/index.md

